server {
    listen 80;
    server_name localhost ymmo.local;

    # Statique Vanilla Frontend
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Microservice ML Python (Port interne 5000)
    location /api/ml/ {
        proxy_pass http://ml_ymmov2:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend Principal Flask (Port interne 8000)
    location /api/ {
        proxy_pass http://backend_ymmov2:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
