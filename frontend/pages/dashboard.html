<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ymmo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard {
            padding: 32px 0;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }

        .dashboard-header h1 {
            font-size: 28px;
            font-weight: 300;
        }

        .dashboard-header .user-info {
            font-size: 14px;
            color: #666;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #1D4E89;
        }

        .stat-card .label {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }

        .bien-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .bien-item .info .title {
            font-weight: 600;
        }

        .bien-item .info .meta {
            font-size: 13px;
            color: #888;
        }

        .bien-item .actions button {
            padding: 4px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 4px;
        }

        .contact-item {
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .contact-item .name {
            font-weight: 600;
        }

        .contact-item .bien {
            font-size: 13px;
            color: #888;
        }

        .contact-item .statut-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
        }

        .statut-badge.nouveau {
            background: #e3f2fd;
            color: #1565c0;
        }

        .statut-badge.lu {
            background: #f5f5f5;
            color: #888;
        }

        .statut-badge.traite {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .btn-add {
            padding: 8px 20px;
            background: #1D4E89;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-add:hover {
            background: #163a64;
        }

        .form-add {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .form-add.active {
            display: block;
        }

        .form-add .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-add input,
        .form-add select,
        .form-add textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-add textarea {
            min-height: 60px;
        }

        .form-add .btn-submit {
            margin-top: 12px;
            padding: 10px 24px;
        }

        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .form-add .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><a href="/">Ymmo</a></div>
                <div class="nav-links">
                    <a href="biens.html">Biens</a>
                    <a href="estimation.html">Estimer</a>
                    <a href="login.html">Connexion</a>
                    <a href="dashboard.html" class="active">Dashboard</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="dashboard">
            <div class="container">
                <div class="dashboard-header">
                    <div>
                        <h1>Dashboard</h1>
                        <div class="user-info" id="userInfo">Chargement...</div>
                    </div>
                    <div>
                        <button class="btn-add" onclick="toggleAddForm()">+ Ajouter un bien</button>
                        <button class="btn btn-outline" onclick="logout()" style="margin-left:8px;">Déconnexion</button>
                    </div>
                </div>

                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="number" id="statBiens">0</div>
                        <div class="label">Biens</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="statVendus">0</div>
                        <div class="label">Vendus</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="statContacts">0</div>
                        <div class="label">Messages reçus</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="statVues">0</div>
                        <div class="label">Vues totales</div>
                    </div>
                </div>

                <div class="form-add" id="addForm">
                    <h4>Ajouter un bien</h4>
                    <div class="form-row">
                        <input type="text" id="add_titre" placeholder="Titre *">
                        <input type="text" id="add_ville" placeholder="Ville *">
                    </div>
                    <div class="form-row">
                        <input type="number" id="add_prix" placeholder="Prix (€) *">
                        <input type="number" id="add_surface" placeholder="Surface (m²) *">
                    </div>
                    <div class="form-row">
                        <select id="add_type">
                            <option value="maison">Maison</option>
                            <option value="appartement">Appartement</option>
                            <option value="commerce">Commerce</option>
                        </select>
                        <select id="add_statut">
                            <option value="vente">Vente</option>
                            <option value="location">Location</option>
                        </select>
                    </div>
                    <input type="number" id="add_pieces" placeholder="Nombre de pièces">
                    <input type="text" id="add_code_postal" placeholder="Code postal">
                    <textarea id="add_description" placeholder="Description..."></textarea>
                    <button class="btn btn-primary btn-submit" onclick="submitBien()">Ajouter le bien</button>
                    <span id="addResult"></span>
                </div>

                <div class="dashboard-grid">
                    <div class="card">
                        <h3>📋 Mes biens</h3>
                        <div id="biensList">
                            <p style="color:#888;">Chargement...</p>
                        </div>
                    </div>
                    <div class="card">
                        <h3>💬 Messages reçus</h3>
                        <div id="contactsList">
                            <p style="color:#888;">Chargement...</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ymmo - Groupe immobilier</p>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
