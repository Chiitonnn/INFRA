<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Ymmo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: #eef3f6;
        }

        .auth-page {
            min-height: calc(100vh - 144px);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 440px;
            gap: 48px;
            align-items: center;
            padding: 56px 0;
        }

        .auth-visual {
            min-height: 560px;
            border-radius: 8px;
            overflow: hidden;
            background:
                linear-gradient(130deg, rgba(29, 78, 137, 0.88), rgba(42, 88, 82, 0.72)),
                url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1400&q=80");
            background-size: cover;
            background-position: center;
            color: white;
            padding: 44px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .auth-visual h1 {
            font-size: 44px;
            line-height: 1.05;
            max-width: 520px;
            margin-bottom: 16px;
        }

        .auth-visual p {
            max-width: 480px;
            color: rgba(255, 255, 255, 0.88);
            font-size: 17px;
        }

        .auth-panel {
            background: white;
            border: 1px solid #dde5ea;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 16px 40px rgba(29, 78, 137, 0.12);
        }

        .auth-panel h2 {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .auth-panel .subtitle {
            color: #64717c;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 24px;
            background: #f1f5f7;
            padding: 4px;
            border-radius: 8px;
        }

        .auth-tabs button {
            border: 0;
            background: transparent;
            padding: 10px 12px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            color: #52616d;
        }

        .auth-tabs button.active {
            background: white;
            color: #1D4E89;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d6dde2;
            border-radius: 6px;
            font-size: 15px;
            background: #fbfcfd;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: 2px solid rgba(29, 78, 137, 0.18);
            border-color: #1D4E89;
            background: white;
        }

        .btn-block {
            width: 100%;
            padding: 13px;
            font-size: 15px;
            border-radius: 6px;
        }

        .message {
            display: none;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .message.error {
            display: block;
            background: #fff1f1;
            color: #b42318;
            border: 1px solid #ffd2d2;
        }

        .message.success {
            display: block;
            background: #ecfdf3;
            color: #027a48;
            border: 1px solid #abefc6;
        }

        .session-actions {
            display: grid;
            gap: 10px;
        }

        @media (max-width: 920px) {
            .auth-page {
                grid-template-columns: 1fr;
                padding: 32px 0;
            }

            .auth-visual {
                min-height: 260px;
                padding: 28px;
            }

            .auth-visual h1 {
                font-size: 32px;
            }
        }

        @media (max-width: 560px) {
            .auth-panel {
                padding: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><a href="/">Ymmo</a></div>
                <div class="nav-links">
                    <a href="biens.html">Biens</a>
                    <a href="estimation.html">Estimer</a>
                    <a href="login.html" class="active">Connexion</a>
                    <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <section class="auth-page">
                <div class="auth-visual">
                    <h1>Votre espace immobilier, clair et sécurisé.</h1>
                    <p>Connectez-vous pour gérer vos biens, suivre les demandes et préparer vos mises en vente.</p>
                </div>

                <div class="auth-panel">
                    <h2 id="authTitle">Connexion</h2>
                    <p class="subtitle" id="authSubtitle">Accédez à votre espace Ymmo.</p>

                    <div id="message" class="message"></div>

                    <div id="authTabs" class="auth-tabs">
                        <button type="button" id="loginTab" class="active" onclick="showLogin()">Connexion</button>
                        <button type="button" id="registerTab" onclick="showRegister()">Compte</button>
                    </div>

                    <form id="loginForm" class="auth-form active">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="agent@ymmo.fr" autocomplete="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Mot de passe</label>
                            <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
                    </form>

                    <form id="registerForm" class="auth-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="reg_prenom">Prénom</label>
                                <input type="text" id="reg_prenom" placeholder="Jean" autocomplete="given-name" required>
                            </div>
                            <div class="form-group">
                                <label for="reg_nom">Nom</label>
                                <input type="text" id="reg_nom" placeholder="Dupont" autocomplete="family-name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reg_email">Email</label>
                            <input type="email" id="reg_email" placeholder="agent@ymmo.fr" autocomplete="email" required>
                        </div>
                        <div class="form-group">
                            <label for="reg_password">Mot de passe</label>
                            <input type="password" id="reg_password" placeholder="8 caractères minimum" autocomplete="new-password" minlength="8" required>
                        </div>
                        <div class="form-group">
                            <label for="reg_role">Profil</label>
                            <select id="reg_role">
                                <option value="client">Client</option>
                                <option value="agent">Agent</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
                    </form>

                    <div id="sessionActions" class="session-actions" style="display:none;">
                        <button type="button" class="btn btn-primary btn-block" id="sessionRedirectBtn" onclick="goToDashboard()">Aller au dashboard</button>
                        <button type="button" class="btn btn-outline btn-block" onclick="logout()">Se déconnecter</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ymmo - Groupe immobilier</p>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script>
        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        function setMode(mode) {
            const isRegister = mode === 'register';
            document.getElementById('loginForm').classList.toggle('active', !isRegister);
            document.getElementById('registerForm').classList.toggle('active', isRegister);
            document.getElementById('loginTab').classList.toggle('active', !isRegister);
            document.getElementById('registerTab').classList.toggle('active', isRegister);
            document.getElementById('authTitle').textContent = isRegister ? 'Créer un compte' : 'Connexion';
            document.getElementById('authSubtitle').textContent = isRegister ? 'Quelques informations pour ouvrir votre espace.' : 'Accédez à votre espace Ymmo.';
            hideMessage();
        }

        function showRegister() {
            setMode('register');
        }

        function showLogin() {
            setMode('login');
        }

        async function ensureLoggedSession() {
            const token = localStorage.getItem('ymmo_token');
            if (!token) return;

            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Session expirée');
                const user = await response.json();
                localStorage.setItem('ymmo_user', JSON.stringify(user));
                document.getElementById('authTabs').style.display = 'none';
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('registerForm').classList.remove('active');
                document.getElementById('sessionActions').style.display = 'grid';
                document.getElementById('authTitle').textContent = 'Déjà connecté';
                document.getElementById('authSubtitle').textContent = `Session active pour ${user.email}.`;
                document.getElementById('sessionRedirectBtn').textContent =
                    user.role === 'admin' ? 'Aller à l\'administration' : 'Aller au dashboard';
            } catch (error) {
                logout(false);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, mot_de_passe: password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Email ou mot de passe incorrect');

                localStorage.setItem('ymmo_token', data.access_token);
                localStorage.setItem('ymmo_user', JSON.stringify(data.user));
                showMessage('Connexion réussie. Redirection...', 'success');
                const redirect = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
                setTimeout(() => window.location.href = redirect, 700);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const password = document.getElementById('reg_password').value;
            if (password.length < 8) {
                showMessage('Le mot de passe doit contenir au moins 8 caractères.', 'error');
                return;
            }

            const userData = {
                nom: document.getElementById('reg_nom').value.trim(),
                prenom: document.getElementById('reg_prenom').value.trim(),
                email: document.getElementById('reg_email').value.trim(),
                mot_de_passe: password,
                role: document.getElementById('reg_role').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || "Erreur lors de l'inscription");

                showMessage('Compte créé. Vous pouvez vous connecter.', 'success');
                document.getElementById('registerForm').reset();
                setTimeout(showLogin, 900);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        function goToDashboard() {
            const user = JSON.parse(localStorage.getItem('ymmo_user') || '{}');
            window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }

        function logout(reload = true) {
            localStorage.removeItem('ymmo_token');
            localStorage.removeItem('ymmo_user');
            if (reload) window.location.reload();
        }

        ensureLoggedSession();
    </script>
</body>

</html>
