<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Ymmo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            max-width: 420px;
            margin: 80px auto 40px;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .auth-container h1 {
            font-size: 26px;
            font-weight: 300;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-container .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }

        .auth-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }

        .auth-link a {
            color: #1D4E89;
            text-decoration: none;
        }

        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
        }

        .message.error {
            display: block;
            background: #fde8e8;
            color: #d32f2f;
            border: 1px solid #f5c6c6;
        }

        .message.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><a href="/">Ymmo</a></div>
                <div class="nav-links">
                    <a href="biens.html">Biens</a>
                    <a href="estimation.html">Estimer</a>
                    <a href="login.html" class="active">Connexion</a>
                    <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <h1>Connexion</h1>
            <p class="subtitle">Accédez à votre espace personnel</p>

            <div id="message" class="message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="agent@ymmo.fr" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
            </form>

            <div class="auth-link">
                Pas encore de compte ? <a href="#" onclick="showRegister()">S'inscrire</a>
            </div>

            <!-- Formulaire d'inscription (caché par défaut) -->
            <form id="registerForm" style="display:none; margin-top:24px; border-top:1px solid #eee; padding-top:24px;">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="reg_nom" placeholder="Dupont">
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="reg_prenom" placeholder="Jean">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg_email" placeholder="agent@ymmo.fr">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="reg_password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Rôle</label>
                    <select id="reg_role">
                        <option value="client">Client</option>
                        <option value="agent">Agent</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">S'inscrire</button>
                <div class="auth-link" style="margin-top:12px;">
                    <a href="#" onclick="showLogin()">Déjà un compte ? Se connecter</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ymmo - Groupe immobilier</p>
        </div>
    </footer>

    <script>
        const API_URL = 'http://192.168.10.10/api';

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            hideMessage();
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            hideMessage();
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, mot_de_passe: password })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Erreur de connexion');
                }

                const data = await response.json();
                localStorage.setItem('ymmo_token', data.access_token);
                localStorage.setItem('ymmo_user', JSON.stringify(data.user || {}));
                showMessage('Connexion réussie ! Redirection...', 'success');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const userData = {
                nom: document.getElementById('reg_nom').value,
                prenom: document.getElementById('reg_prenom').value,
                email: document.getElementById('reg_email').value,
                mot_de_passe: document.getElementById('reg_password').value,
                role: document.getElementById('reg_role').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Erreur d\'inscription');
                }

                showMessage('Inscription réussie ! Vous pouvez vous connecter.', 'success');
                document.getElementById('registerForm').reset();
                setTimeout(showLogin, 1500);

            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        // Vérifier si déjà connecté
        if (localStorage.getItem('ymmo_token')) {
            document.querySelector('.auth-container h1').textContent = 'Déjà connecté';
            document.querySelector('.subtitle').textContent = 'Vous êtes déjà connecté. Accédez au dashboard.';
            document.getElementById('loginForm').innerHTML = `
                <button type="button" class="btn btn-primary btn-block" onclick="window.location.href='dashboard.html'">
                    Aller au dashboard
                </button>
                <button type="button" class="btn btn-outline btn-block" onclick="logout()" style="margin-top:8px;">
                    Se déconnecter
                </button>
            `;
        }

        function logout() {
            localStorage.removeItem('ymmo_token');
            localStorage.removeItem('ymmo_user');
            window.location.reload();
        }
    </script>
</body>

</html>
