<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimation - Ymmo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .estimation-container {
            max-width: 760px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .estimation-container h1 {
            font-size: 30px;
            font-weight: 300;
            margin-bottom: 8px;
            text-align: center;
        }

        .estimation-container .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
        }

        .step-dot.active,
        .step-dot.done {
            background: #1D4E89;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d8dde1;
            border-radius: 6px;
            font-size: 15px;
            background: #fbfcfd;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .checks {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .checks label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border: 1px solid #d8dde1;
            border-radius: 6px;
            background: #fbfcfd;
            font-weight: 700;
        }

        .checks input {
            width: auto;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-group .btn {
            flex: 1;
            text-align: center;
        }

        .result-box {
            background: #F7F6F3;
            padding: 32px;
            border-radius: 8px;
            text-align: center;
            margin-top: 16px;
        }

        .result-box .price {
            font-size: 44px;
            font-weight: 700;
            color: #1D4E89;
        }

        .result-box .range {
            color: #666;
            font-size: 18px;
        }

        .result-box .details {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .result-box .details>div {
            background: white;
            padding: 16px;
            border-radius: 6px;
        }

        .result-box .details .label {
            font-size: 12px;
            color: #777;
        }

        .result-box .details .value {
            font-size: 20px;
            font-weight: 700;
        }

        @media (max-width: 680px) {
            .estimation-container {
                padding: 24px;
                margin: 24px auto;
            }

            .form-row,
            .checks,
            .result-box .details {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><a href="/">Ymmo</a></div>
                <div class="nav-links">
                    <a href="biens.html">Biens</a>
                    <a href="estimation.html" class="active">Estimer</a>
                    <a href="login.html">Connexion</a>
                    <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="estimation-container">
                <h1>Estimer votre bien</h1>
                <p class="subtitle">Obtenez une estimation en quelques secondes.</p>

                <div class="step-indicator" id="stepIndicator">
                    <span class="step-dot active" data-step="1"></span>
                    <span class="step-dot" data-step="2"></span>
                    <span class="step-dot" data-step="3"></span>
                    <span class="step-dot" data-step="4"></span>
                </div>

                <form id="estimationForm">
                    <div class="form-step active" data-step="1">
                        <h3>Type de bien</h3>
                        <div class="form-group">
                            <label for="type_bien">Type de bien *</label>
                            <select id="type_bien" required>
                                <option value="">Sélectionnez...</option>
                                <option value="maison">Maison</option>
                                <option value="appartement">Appartement</option>
                                <option value="commerce">Local commercial</option>
                            </select>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn btn-primary" onclick="goToStep(2)">Suivant</button>
                        </div>
                    </div>

                    <div class="form-step" data-step="2">
                        <h3>Localisation</h3>
                        <div class="form-group">
                            <label for="ville">Ville *</label>
                            <input type="text" id="ville" placeholder="Ex: Aix-en-Provence" required>
                        </div>
                        <div class="form-group">
                            <label for="code_postal">Code postal *</label>
                            <input type="text" id="code_postal" placeholder="13090" required>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn btn-outline" onclick="goToStep(1)">Précédent</button>
                            <button type="button" class="btn btn-primary" onclick="goToStep(3)">Suivant</button>
                        </div>
                    </div>

                    <div class="form-step" data-step="3">
                        <h3>Caractéristiques</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="surface_m2">Surface (m²) *</label>
                                <input type="number" id="surface_m2" placeholder="75" min="1" required>
                            </div>
                            <div class="form-group">
                                <label for="nb_pieces">Nombre de pièces *</label>
                                <input type="number" id="nb_pieces" placeholder="3" min="1" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="etage">Étage</label>
                                <input type="number" id="etage" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label for="annee_construction">Année de construction</label>
                                <input type="number" id="annee_construction" placeholder="2010" min="1800" max="2026">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="etat_general">État général</label>
                            <select id="etat_general">
                                <option value="1">Mauvais</option>
                                <option value="2">Correct</option>
                                <option value="3" selected>Bon</option>
                                <option value="4">Très bon</option>
                                <option value="5">Excellent</option>
                            </select>
                        </div>
                        <div class="checks">
                            <label><input type="checkbox" id="has_garage"> Garage</label>
                            <label><input type="checkbox" id="has_jardin"> Jardin</label>
                            <label><input type="checkbox" id="has_piscine"> Piscine</label>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="btn btn-outline" onclick="goToStep(2)">Précédent</button>
                            <button type="button" class="btn btn-primary" onclick="submitEstimation()">Estimer</button>
                        </div>
                    </div>

                    <div class="form-step" data-step="4">
                        <h3>Résultat de l'estimation</h3>
                        <div id="resultContent"></div>
                        <div class="btn-group">
                            <button type="button" class="btn btn-outline" onclick="goToStep(3)">Modifier</button>
                            <button type="button" class="btn btn-primary" onclick="location.href='biens.html'">Voir les biens</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ymmo - Groupe immobilier</p>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/estimation.js"></script>
</body>

</html>
