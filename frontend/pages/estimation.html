<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimation - Ymmo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .estimation-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .estimation-container h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 8px;
            text-align: center;
        }

        .estimation-container .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
            transition: background 0.3s;
        }

        .step-dot.active {
            background: #1D4E89;
        }

        .step-dot.done {
            background: #1D4E89;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .result-box {
            background: #F7F6F3;
            padding: 32px;
            border-radius: 8px;
            text-align: center;
            margin-top: 16px;
        }

        .result-box .price {
            font-size: 48px;
            font-weight: 700;
            color: #1D4E89;
        }

        .result-box .range {
            color: #666;
            font-size: 18px;
        }

        .result-box .details {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .result-box .details div {
            background: white;
            padding: 16px;
            border-radius: 4px;
        }

        .result-box .details .label {
            font-size: 12px;
            color: #888;
        }

        .result-box .details .value {
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><a href="/">Ymmo</a></div>
                <div class="nav-links">
                    <a href="biens.html">Biens</a>
                    <a href="estimation.html" class="active">Estimer</a>
                    <a href="login.html">Connexion</a>
                    <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="estimation-container">
            <h1>Estimer votre bien</h1>
            <p class="subtitle">Obtenez une estimation en 2 minutes</p>

            <div class="step-indicator" id="stepIndicator">
                <span class="step-dot active" data-step="1"></span>
                <span class="step-dot" data-step="2"></span>
                <span class="step-dot" data-step="3"></span>
                <span class="step-dot" data-step="4"></span>
            </div>

            <form id="estimationForm">
                <!-- Étape 1 -->
                <div class="form-step active" data-step="1">
                    <h3>Type de bien</h3>
                    <div class="form-group">
                        <label>Type de bien *</label>
                        <select id="type_bien" required>
                            <option value="">Sélectionnez...</option>
                            <option value="maison">Maison</option>
                            <option value="appartement">Appartement</option>
                            <option value="commerce">Local commercial</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="goToStep(2)">Suivant</button>
                    </div>
                </div>

                <!-- Étape 2 -->
                <div class="form-step" data-step="2">
                    <h3>Localisation</h3>
                    <div class="form-group">
                        <label>Ville *</label>
                        <input type="text" id="ville" placeholder="Ex: Aix-en-Provence" required>
                    </div>
                    <div class="form-group">
                        <label>Code postal *</label>
                        <input type="text" id="code_postal" placeholder="13090" required>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-outline" onclick="goToStep(1)">Précédent</button>
                        <button type="button" class="btn btn-primary" onclick="goToStep(3)">Suivant</button>
                    </div>
                </div>

                <!-- Étape 3 -->
                <div class="form-step" data-step="3">
                    <h3>Caractéristiques</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Surface (m²) *</label>
                            <input type="number" id="surface_m2" placeholder="75" required>
                        </div>
                        <div class="form-group">
                            <label>Nombre de pièces *</label>
                            <input type="number" id="nb_pieces" placeholder="3" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Étage</label>
                            <input type="number" id="etage" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Année de construction</label>
                            <input type="number" id="annee_construction" placeholder="2010">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>État général</label>
                        <select id="etat_general">
                            <option value="1">Mauvais</option>
                            <option value="2">Correct</option>
                            <option value="3" selected>Bon</option>
                            <option value="4">Très bon</option>
                            <option value="5">Excellent</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><input type="checkbox" id="has_garage"> Garage</label>
                        </div>
                        <div class="form-group">
                            <label><input type="checkbox" id="has_jardin"> Jardin</label>
                        </div>
                        <div class="form-group">
                            <label><input type="checkbox" id="has_piscine"> Piscine</label>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-outline" onclick="goToStep(2)">Précédent</button>
                        <button type="button" class="btn btn-primary" onclick="submitEstimation()">Estimer</button>
                    </div>
                </div>

                <!-- Étape 4 - Résultat -->
                <div class="form-step" data-step="4">
                    <h3>Résultat de l'estimation</h3>
                    <div id="resultContent">
                        <div class="result-box">
                            <div class="spinner">⏳</div>
                            <p>Calcul en cours...</p>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-outline" onclick="goToStep(3)">Modifier</button>
                        <button type="button" class="btn btn-primary" onclick="location.href='biens.html'">Voir les
                            biens</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ymmo - Groupe immobilier</p>
        </div>
    </footer>

    <script>
        let currentStep = 1;
        const totalSteps = 4;

        function goToStep(step) {
            if (step < 1 || step > totalSteps) return;
            currentStep = step;

            document.querySelectorAll('.form-step').forEach(el => el.classList.remove('active'));
            document.querySelector(`.form-step[data-step="${step}"]`).classList.add('active');

            document.querySelectorAll('.step-dot').forEach(el => {
                const s = parseInt(el.dataset.step);
                el.classList.remove('active', 'done');
                if (s === step) el.classList.add('active');
                else if (s < step) el.classList.add('done');
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function submitEstimation() {
            const data = {
                surface_m2: parseFloat(document.getElementById('surface_m2').value),
                nb_pieces: parseInt(document.getElementById('nb_pieces').value),
                type_bien: document.getElementById('type_bien').value,
                ville: document.getElementById('ville').value,
                code_postal: document.getElementById('code_postal').value,
                etage: parseInt(document.getElementById('etage').value) || 0,
                annee_construction: parseInt(document.getElementById('annee_construction').value) || 2000,
                etat_general: parseInt(document.getElementById('etat_general').value) || 3,
                has_garage: document.getElementById('has_garage').checked,
                has_jardin: document.getElementById('has_jardin').checked,
                has_piscine: document.getElementById('has_piscine').checked
            };

            // Validation basique
            if (!data.type_bien || !data.ville || !data.surface_m2 || !data.nb_pieces) {
                alert('Veuillez remplir tous les champs obligatoires.');
                return;
            }

            goToStep(4);
            document.querySelector('#resultContent').innerHTML = `
                <div class="result-box">
                    <div style="font-size:40px; margin-bottom:16px;">⏳</div>
                    <p>Calcul en cours...<br><small>L'IA analyse les données du marché</small></p>
                </div>
            `;

            try {
                const response = await fetch('http://192.168.10.10/api/ml/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error('Erreur API');
                const result = await response.json();

                document.querySelector('#resultContent').innerHTML = `
                    <div class="result-box">
                        <div class="price">${result.prix_estime.toLocaleString('fr-FR')} €</div>
                        <div class="range">${result.prix_min.toLocaleString('fr-FR')} € - ${result.prix_max.toLocaleString('fr-FR')} €</div>
                        <div class="details">
                            <div><div class="label">Prix au m²</div><div class="value">${result.prix_m2_zone.toLocaleString('fr-FR')} €</div></div>
                            <div><div class="label">Score confiance</div><div class="value">${(result.score_confiance * 100).toFixed(0)}%</div></div>
                            <div><div class="label">Surface</div><div class="value">${data.surface_m2} m²</div></div>
                        </div>
                        <div style="margin-top:24px; display:flex; gap:12px; justify-content:center;">
                            <button class="btn btn-primary" onclick="alert('Un agent vous contactera')">Être contacté</button>
                            <button class="btn btn-outline" onclick="alert('Votre bien sera mis en ligne')">Mettre en vente</button>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.querySelector('#resultContent').innerHTML = `
                    <div class="result-box" style="border:2px solid #d32f2f;">
                        <p style="color:#d32f2f;">❌ Erreur lors de l'estimation</p>
                        <p style="font-size:14px; color:#666;">${error.message}</p>
                        <button class="btn btn-primary" onclick="goToStep(3)">Réessayer</button>
                    </div>
                `;
            }
        }
    </script>
</body>

</html>
