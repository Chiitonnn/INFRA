<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche annonce - Ymmo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .bien-detail {
            padding: 40px 0;
        }

        .bien-detail .container {
            max-width: 1000px;
        }

        .bien-detail .gallery {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 8px;
            margin-bottom: 32px;
        }

        .bien-detail .gallery img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
        }

        .bien-detail .gallery .thumbnails {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .bien-detail .gallery .thumbnails img {
            height: 196px;
            cursor: pointer;
        }

        .bien-detail .main-info {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .bien-detail .price-block {
            background: #F7F6F3;
            padding: 24px;
            border-radius: 8px;
            text-align: center;
        }

        .bien-detail .price-block .price {
            font-size: 32px;
            font-weight: 700;
            color: #1D4E89;
        }

        .bien-detail .price-block .statut {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 4px;
        }

        .bien-detail .specs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .bien-detail .specs div {
            background: #F7F6F3;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        .bien-detail .specs .value {
            font-weight: 700;
            font-size: 18px;
        }

        .bien-detail .specs .label {
            font-size: 12px;
            color: #888;
        }

        .bien-detail .description {
            margin: 16px 0;
            line-height: 1.8;
        }

        .bien-detail .agent-block {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin: 16px 0;
        }

        .bien-detail .agent-block .agent-name {
            font-weight: 700;
        }

        .bien-detail .agent-block .agent-agence {
            color: #888;
            font-size: 14px;
        }

        .bien-detail .contact-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-height: 100px;
            font-family: inherit;
        }

        .bien-detail .contact-form input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .bien-detail .similar {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid #eee;
        }

        .bien-detail .similar h3 {
            margin-bottom: 16px;
        }

        .bien-detail .similar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .bien-detail .similar-grid .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 12px;
        }

        .bien-detail .similar-grid .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
        }

        .bien-detail .similar-grid .card .price {
            font-weight: 700;
            color: #1D4E89;
        }

        @media (max-width: 768px) {
            .bien-detail .main-info {
                grid-template-columns: 1fr;
            }

            .bien-detail .gallery {
                grid-template-columns: 1fr;
            }

            .bien-detail .gallery .thumbnails {
                grid-template-columns: repeat(4, 1fr);
            }

            .bien-detail .gallery .thumbnails img {
                height: 80px;
            }

            .bien-detail .specs {
                grid-template-columns: 1fr 1fr;
            }

            .bien-detail .similar-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><a href="/">Ymmo</a></div>
                <div class="nav-links">
                    <a href="biens.html">Biens</a>
                    <a href="estimation.html">Estimer</a>
                    <a href="login.html">Connexion</a>
                    <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="bien-detail" id="bienDetail">
            <div class="container">
                <div id="loading" style="text-align:center; padding:60px;">Chargement...</div>
                <div id="content" style="display:none;">
                    <div class="gallery" id="gallery"></div>
                    <div class="main-info">
                        <div>
                            <h1 id="bienTitle"></h1>
                            <p id="bienLocation" style="color:#888;"></p>
                            <div class="specs" id="specs"></div>
                            <div class="description" id="bienDescription"></div>
                            <div class="agent-block" id="agentBlock">
                                <div class="agent-name" id="agentName">Agent Ymmo</div>
                                <div class="agent-agence" id="agentAgence">Agence Ymmo</div>
                            </div>
                            <div class="contact-form">
                                <h4>Contacter l'agent</h4>
                                <input type="text" id="contactNom" placeholder="Votre nom">
                                <input type="email" id="contactEmail" placeholder="Votre email">
                                <input type="tel" id="contactTel" placeholder="Votre téléphone">
                                <textarea id="contactMessage" placeholder="Votre message..."></textarea>
                                <button class="btn btn-primary" onclick="sendContact()">Envoyer</button>
                                <div id="contactMessageResult" style="margin-top:8px;"></div>
                            </div>
                        </div>
                        <div>
                            <div class="price-block">
                                <div class="price" id="bienPrice"></div>
                                <span class="statut" id="bienStatut"></span>
                            </div>
                            <div style="background:#F7F6F3; padding:16px; border-radius:8px; margin-top:16px;">
                                <p style="font-size:14px; color:#666;">Prix au m² : <strong id="prixM2">-</strong></p>
                                <p style="font-size:14px; color:#666;">Référence : <strong id="bienRef">-</strong></p>
                            </div>
                        </div>
                    </div>
                    <div class="similar" id="similarSection">
                        <h3>Biens similaires</h3>
                        <div class="similar-grid" id="similarGrid"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ymmo - Groupe immobilier</p>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script>
        let currentBienId = null;

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function loadBien() {
            const id = getUrlParams();
            if (!id) {
                document.getElementById('loading').textContent = '❌ Aucun bien spécifié';
                return;
            }
            currentBienId = id;

            try {
                const response = await fetch(`${API_URL}/biens/${id}`);
                if (!response.ok) throw new Error('Bien non trouvé');
                const bien = await response.json();
                displayBien(bien);
                loadSimilar(bien);
            } catch (error) {
                document.getElementById('loading').textContent = '❌ ' + error.message;
            }
        }

        function displayBien(bien) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            document.getElementById('bienTitle').textContent = bien.titre || 'Bien immobilier';
            document.getElementById('bienLocation').textContent = `${bien.ville || ''} ${bien.code_postal || ''}`;
            document.getElementById('bienPrice').textContent = `${bien.prix?.toLocaleString('fr-FR') || '0'} €`;

            const statutEl = document.getElementById('bienStatut');
            statutEl.textContent = bien.statut || 'vente';
            statutEl.className = `statut ${bien.statut || 'vente'}`;

            const specsData = [
                { label: 'Surface', value: `${bien.surface_m2 || 0} m²` },
                { label: 'Pièces', value: bien.nb_pieces || 0 },
                { label: 'Chambres', value: bien.nb_chambres || 0 },
                { label: 'Étage', value: bien.etage || 0 }
            ];
            document.getElementById('specs').innerHTML = specsData.map(s =>
                `<div><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`
            ).join('');

            document.getElementById('bienDescription').textContent = bien.description || 'Aucune description disponible.';
            document.getElementById('agentName').textContent = 'Agent Ymmo';
            document.getElementById('agentAgence').textContent = 'Agence Ymmo';
            document.getElementById('prixM2').textContent = bien.surface_m2 ? `${(bien.prix / bien.surface_m2).toFixed(0)} €` : '-';
            document.getElementById('bienRef').textContent = `YMMO-${String(bien.id).padStart(6, '0')}`;

            // Galerie
            const galleryHtml = `
                <img src="https://picsum.photos/seed/${bien.id}/800/400" alt="${bien.titre}">
                <div class="thumbnails">
                    ${[1, 2, 3, 4].map(i => `
                        <img src="https://picsum.photos/seed/${bien.id}${i}/400/200" alt="Photo ${i}">
                    `).join('')}
                </div>
            `;
            document.getElementById('gallery').innerHTML = galleryHtml;

            // Pré-remplir le formulaire de contact
            document.getElementById('contactNom').value = '';
            document.getElementById('contactEmail').value = '';
            document.getElementById('contactTel').value = '';
            document.getElementById('contactMessage').value = `Bonjour, je suis intéressé par le bien ${bien.titre} (réf: YMMO-${String(bien.id).padStart(6, '0')}).`;
        }

        async function loadSimilar(bien) {
            try {
                const response = await fetch(`${API_URL}/biens/?ville=${encodeURIComponent(bien.ville || '')}&limit=3`);
                if (!response.ok) throw new Error('Erreur chargement similaires');
                const biens = await response.json();
                const filtered = biens.filter(b => b.id !== bien.id).slice(0, 3);
                const grid = document.getElementById('similarGrid');
                if (filtered.length === 0) {
                    grid.innerHTML = '<p style="color:#888;">Aucun bien similaire trouvé</p>';
                    return;
                }
                grid.innerHTML = filtered.map(b => `
                    <div class="card" onclick="window.location.href='bien.html?id=${b.id}'">
                        <img src="https://picsum.photos/seed/${b.id}/400/200" alt="${b.titre}">
                        <div class="price">${b.prix?.toLocaleString('fr-FR') || '0'} €</div>
                        <div>${b.titre || 'Bien'}</div>
                        <div style="font-size:13px; color:#888;">${b.ville || ''} • ${b.surface_m2 || 0} m²</div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('similarGrid').innerHTML = '<p style="color:#888;">Impossible de charger les biens similaires</p>';
            }
        }

        async function sendContact() {
            const resultEl = document.getElementById('contactMessageResult');
            resultEl.innerHTML = '';

            const nom = document.getElementById('contactNom').value.trim();
            const email = document.getElementById('contactEmail').value.trim();
            const telephone = document.getElementById('contactTel').value.trim();
            const message = document.getElementById('contactMessage').value.trim();

            if (!nom || !email || !message) {
                resultEl.innerHTML = '<span style="color:#d32f2f;">Veuillez remplir tous les champs obligatoires.</span>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/contacts/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bien_id: parseInt(currentBienId),
                        nom,
                        email,
                        telephone,
                        message
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Erreur lors de l\'envoi');
                }

                resultEl.innerHTML = '<span style="color:#2e7d32;">✅ Message envoyé ! L\'agent vous répondra rapidement.</span>';
                document.getElementById('contactNom').value = '';
                document.getElementById('contactEmail').value = '';
                document.getElementById('contactTel').value = '';
                document.getElementById('contactMessage').value = '';

            } catch (error) {
                resultEl.innerHTML = `<span style="color:#d32f2f;">❌ ${error.message}</span>`;
            }
        }

        // Charger au démarrage
        loadBien();
    </script>
</body>

</html>
