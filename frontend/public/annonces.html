<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Annonces - Ymmo V2</title>
    <link rel="stylesheet" href="css/main.css">
    <!-- Leaflet.js pour la cartographie open-source gratuite -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <header>
        <a href="index.html" class="logo">YMMO</a>
        <nav>
            <a href="annonces.html">Acheter</a>
            <a href="estimer.html">Estimer son bien</a>
            <a href="auth.html" class="btn btn-secondary">Connexion Pro</a>
        </nav>
    </header>

    <main class="container" style="display:flex; gap:2rem;">
        <!-- Filtres latéraux -->
        <aside
            style="flex: 0 0 250px; background-color: var(--bg-white); padding: 1.5rem; border: 1px solid var(--border-color);">
            <h3>Filtres</h3>
            <form id="filterForm">
                <label>Ville</label>
                <input type="text" name="ville" placeholder="Aix-en-Provence">

                <label>Budget Max</label>
                <input type="number" name="prix_max" placeholder="Ex: 500000">

                <label>Surface min (m²)</label>
                <input type="number" name="surface_min">

                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Appliquer</button>
            </form>
        </aside>

        <!-- Liste & Carte -->
        <div style="flex: 1;">
            <div id="map" style="height: 300px; margin-bottom: 2rem; background-color: #EEE;"></div>

            <h2 id="resultCount">Dernières annonces</h2>
            <div class="grid" id="annoncesGrid">
                <!-- Les cartes seront injectées ici par Javascript -->
                <p>Chargement des biens...</p>
            </div>
        </div>
    </main>

    <script>
        // Initialisation de la carte sur la France entière
        var map = L.map('map').setView([46.603354, 1.888334], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Récupération des données fictives depuis le backend
        fetch('/api/biens/')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('annoncesGrid');
                grid.innerHTML = '';

                if (data.data && data.data.length > 0) {
                    data.data.forEach(bien => {
                        grid.innerHTML += `
                            <div class="card">
                                <img src="${bien.photos.length ? bien.photos[0] : 'https://placehold.co/400x300?text=Sans+Image'}" alt="Photo">
                                <div class="card-body">
                                    <div class="prix">${bien.prix.toLocaleString()} €</div>
                                    <h4 style="margin:0 0 0.5rem 0">${bien.titre}</h4>
                                    <div class="tags">
                                        <span>${bien.surface_m2} m²</span>
                                        <span>${bien.nb_pieces} pièces</span>
                                        <span style="font-weight:bold">${bien.ville}</span>
                                    </div>
                                    <a href="#" class="btn btn-secondary" style="width:100%; text-align:center;">Détails</a>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = '<p>Aucune annonce ne correspond à votre recherche pour le moment.</p>';
                }
            })
            .catch(err => {
                document.getElementById('annoncesGrid').innerHTML = '<p>Erreur de communication avec le serveur Ymmo.</p>';
            });
    </script>
</body>

</html>
