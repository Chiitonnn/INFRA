<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ymmo V2 - IMMOBILIER</title>
    <!-- Nouvelles typographies -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <header>
        <a href="index.html" class="logo">YMMO</a>
        <nav>
            <a href="annonces.html">Acheter</a>
            <a href="estimer.html">Estimer son bien</a>
            <a href="auth.html" class="btn btn-secondary">Connexion Pro</a>
        </nav>
    </header>

    <main class="container">
        <!-- HERO SECTION SANS IMAGE DE FOND, ULTRA FLAT -->
        <section class="hero">
            <h1 style="color: var(--accent-bleu); font-size: 2.5rem; margin-bottom: 1rem;">Votre agence de proximité.
            </h1>
            <p style="font-size: 1.2rem; margin-bottom: 2rem; color: #555;">Nous trouvons le bien qui vous correspond
                sur Aix-en-Provence et dans la France entière.</p>

            <form action="annonces.html" method="GET"
                style="display:flex; gap: 1rem; max-width: 800px; margin: 0 auto; flex-wrap: wrap; justify-content: center;">
                <div style="flex: 1; min-width: 250px;">
                    <input type="text" name="ville" placeholder="Ville ou code postal" style="margin-bottom: 0;">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <select name="type" style="margin-bottom: 0;">
                        <option value="">Tous les types</option>
                        <option value="maison">Maison</option>
                        <option value="appartement">Appartement</option>
                        <option value="commerce">Commerce</option>
                    </select>
                </div>
                <div>
                    <button type="submit" class="btn btn-primary" style="padding: 0.8rem 2rem;">Rechercher</button>
                </div>
            </form>
        </section>

        <!-- CHIFFRES CLES -->
        <section style="margin-top: 4rem; text-align: center;">
            <h2 style="margin-bottom: 2rem; color: var(--text-anthracite);">Ymmo en chiffres</h2>
            <div class="grid">
                <div class="card" style="border:none; background: transparent;">
                    <h3 style="font-size: 3rem; color: var(--accent-bleu); margin:0;">12</h3>
                    <p style="font-weight: 500;">Agences Connectées</p>
                </div>
                <div class="card" style="border:none; background: transparent;">
                    <h3 style="font-size: 3rem; color: var(--accent-bleu); margin:0;">+3 500</h3>
                    <p style="font-weight: 500;">Biens en vente</p>
                </div>
                <div class="card" style="border:none; background: transparent;">
                    <h3 style="font-size: 3rem; color: var(--accent-bleu); margin:0;">100%</h3>
                    <p style="font-weight: 500;">D'estimations IA Fiables</p>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
