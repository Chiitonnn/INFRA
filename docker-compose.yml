version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: ymmo_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ymmo_db
      MYSQL_USER: ymmo_user
      MYSQL_PASSWORD: ymmo_pass
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  ml:
    build: ./ml-service
    container_name: ymmo_ml
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./ml-service:/app
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --reload
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ymmo_backend
    environment:
      DATABASE_URL: mysql+pymysql://ymmo_user:ymmo_pass@db:3306/ymmo_db
      ML_URL: http://ml:5000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - ml
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ymmo_nginx
    ports:
      - "8082:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data: