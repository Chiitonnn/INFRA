services:
  db_ymmov2:
    image: mysql:8.0
    container_name: db_ymmov2_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: myrootpassword
      MYSQL_DATABASE: ymmov2_db
      MYSQL_USER: ymmo_user
      MYSQL_PASSWORD: ymmo_password
    volumes:
      - db_ymmov2_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"

  ml_ymmov2:
    build: ./ml_service
    container_name: ml_ymmov2_flask
    restart: always
    ports:
      - "127.0.0.1:5000:5000"

  backend_ymmov2:
    build: ./backend
    container_name: backend_ymmov2_flask
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://ymmo_user:ymmo_password@db_ymmov2:3306/ymmov2_db
      - ML_API_URL=http://ml_ymmov2:5000
      - SECRET_KEY=clef_super_secrete_b2
    depends_on:
      - db_ymmov2
    ports:
      - "127.0.0.1:8000:8000"

  web_ymmov2:
    image: nginx:alpine
    container_name: web_ymmov2_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/public:/usr/share/nginx/html
    depends_on:
      - backend_ymmov2
      - ml_ymmov2

volumes:
  db_ymmov2_data: